app:
  security:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: true

logging:
  level:
    br.com.cashflow: INFO
