app:
  bootstrap:
    secret: ${BOOTSTRAP_SECRET:dev-bootstrap-secret}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:default-secret-key-min-256-bits-for-hs256-algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}

server:
  port: ${SERVER_PORT:8081}

spring:
  jpa:
    show-sql: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cashflowdb}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 20260220100005
    baseline-description: "Legacy migration baseline"
    validate-on-migrate: false
  thymeleaf:
    cache: false

# Logs detalhados em desenvolvimento: análise de bugs, debug e requisições HTTP (incl. erros)
logging:
  level:
    root: INFO
    br.com.cashflow: DEBUG
    # Requisições HTTP (método, URI, status, handlers)
    web: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet.mvc.method.annotation: DEBUG
    # Exceções e erros tratados pelo Spring (ExceptionHandler, respostas 4xx/5xx)
    org.springframework.web.servlet.mvc.support.DefaultHandlerExceptionResolver: DEBUG
    # SQL (opcional; descomente para ver queries e parâmetros)
    # org.springframework.jdbc.core: DEBUG
    # org.springframework.jdbc.core.StatementCreatorUtils: TRACE

pagbank:
  api:
    url: https://edi.api.pagbank.com.br
    username: ${PAGBANK_USERNAME:}
    password: ${PAGBANK_PASSWORD:}
    page-size: ${PAGBANK_PAGE_SIZE:1000}
    inicio: ${PAGBANK_DATA_INICIO:2025-01-01}
  encryption:
    key: ${PAGBANK_ENCRYPTION_KEY:}
