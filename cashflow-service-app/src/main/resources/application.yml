# TEMPLATE: Change application name when cloning
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}
  security:
    enabled: ${APP_SECURITY_ENABLED:true}

spring:
  application:
    name: cashflow-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 20260220100005
    baseline-description: "Legacy migration baseline"
    validate-on-migrate: false

server:
  port: ${SERVER_PORT:8081}
  servlet:
    session:
      timeout: 30m
      cookie:
        same-site: lax
        http-only: true

# Actuator - health check e info
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
