# TEMPLATE: Change application name when cloning
app:
  bootstrap:
    secret: ${BOOTSTRAP_SECRET:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
  jwt:
    secret: ${JWT_SECRET:default-secret-key-min-256-bits-for-hs256-algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

spring:
  application:
    name: cashflow-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      # Multitenancy: tabelas tenant ficam em schemas por tenant (search_path em runtime).
      # Validação de schema no startup não vê essas tabelas; Flyway gerencia o DDL.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}
  servlet:
    session:
      timeout: 30m
      cookie:
        same-site: lax
        http-only: true

# Actuator - health check e info
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

pagbank:
  api:
    url: https://edi.api.pagbank.com.br
    username: ${PAGBANK_USERNAME:}
    password: ${PAGBANK_PASSWORD:}
    page-size: ${PAGBANK_PAGE_SIZE:1000}
    inicio: ${PAGBANK_DATA_INICIO:2025-01-01}
  encryption:
    key: ${PAGBANK_ENCRYPTION_KEY:}
